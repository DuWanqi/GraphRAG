### GraphRAG 配置文件
### 使用 数标标 API 作为 LLM，Ollama 作为 Embedding
### 自定义工作流：跳过 create_community_reports

models:
  default_chat_model:
    type: openai_chat
    model_provider: openai
    auth_type: api_key
    api_key: ${SHUBIAOBIAO_API_KEY}
    api_base: https://hk.n1n.ai/v1
    model: gemini-2.5-flash-nothinking
    model_supports_json: false
    concurrent_requests: 1
    async_mode: threaded
    retry_strategy: exponential_backoff
    max_retries: 5
    tokens_per_minute: 30000
    requests_per_minute: 5

embedding_models:
  default_embedding_model:
    type: litellm
    model_provider: ollama
    auth_type: api_key
    api_key: ollama
    api_base: http://localhost:11434
    model: nomic-embed-text
    concurrent_requests: 5
    async_mode: threaded
    retry_strategy: exponential_backoff
    max_retries: 3

completion_models:
  default_completion_model:
    type: litellm
    model_provider: openai
    auth_type: api_key
    api_key: ${SHUBIAOBIAO_API_KEY}
    api_base: https://hk.n1n.ai/v1
    model: gemini-2.5-flash-nothinking
    model_supports_json: false
    concurrent_requests: 1
    async_mode: threaded
    retry_strategy: exponential_backoff
    max_retries: 5
    tokens_per_minute: 30000
    requests_per_minute: 5

# 自定义工作流 - 跳过 create_community_reports
workflows:
  - load_input_documents
  - create_base_text_units
  - create_final_documents
  - extract_graph
  - finalize_graph
  - extract_covariates
  - create_communities
  - create_final_text_units
  # - create_community_reports  # 跳过社区报告生成
  - generate_text_embeddings

input:
  type: json

input_storage:
  type: file
  base_dir: "input_json"

chunks:
  size: 1200
  overlap: 100
  group_by_columns: [id]

output:
  type: file
  base_dir: "output"

cache:
  type: json
  storage:
    type: file
    base_dir: "cache"

reporting:
  type: file
  base_dir: "logs"

vector_store:
  default_vector_store:
    type: lancedb
    db_uri: output/lancedb
    container_name: default

embed_text:
  model_id: default_embedding_model
  vector_store_id: default_vector_store

extract_graph:
  model_id: default_chat_model
  prompt: "prompts/extract_graph.txt"
  entity_types: [organization, person, geo, event]
  max_gleanings: 1

summarize_descriptions:
  model_id: default_chat_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english
    async_mode: threaded

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: false
  model_id: default_chat_model
  prompt: "prompts/extract_claims.txt"
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 1

community_reports:
  enabled: false
  model_id: default_chat_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 2000
  max_input_length: 8000

embed_graph:
  enabled: false

umap:
  enabled: false

snapshots:
  graphml: false
  embeddings: false

local_search:
  chat_model_id: default_chat_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  chat_model_id: default_chat_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  chat_model_id: default_chat_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_reduce_prompt.txt"

basic_search:
  chat_model_id: default_chat_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
